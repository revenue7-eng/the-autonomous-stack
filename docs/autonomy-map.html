---
layout: default
title: "Autonomy Map"
nav_order: 6
---
{% raw %}
<div style="padding:1rem 0;font-family:var(--font-sans);">

<p style="font-size:15px;color:var(--color-text-secondary);margin-bottom:1.5rem;line-height:1.6;">
Every technology in the catalog — by category, autonomy level, transparency, and trajectory. Click any card to open its full assessment.
</p>

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.25rem;">
  <select id="trajF" style="font-size:13px;padding:5px 10px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#333;">
    <option value="all">All trajectories</option>
    <option value="opening">Opening</option>
    <option value="stable">Stable</option>
    <option value="mixed">Mixed</option>
    <option value="closing">Closing</option>
  </select>
  <select id="aF" style="font-size:13px;padding:5px 10px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#333;">
    <option value="all">Autonomy: all</option>
    <option value="3">A3</option>
    <option value="2">A2</option>
    <option value="1">A1</option>
    <option value="0">A0</option>
  </select>
  <select id="tF" style="font-size:13px;padding:5px 10px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#333;">
    <option value="all">Transparency: all</option>
    <option value="2">T2</option>
    <option value="1">T1</option>
    <option value="0">T0</option>
  </select>
</div>

<div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:1.25rem;font-size:12px;color:#666;">
  <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:50%;background:#22c55e;display:inline-block;"></span>Opening</span>
  <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:50%;background:#3b82f6;display:inline-block;"></span>Stable</span>
  <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:50%;background:#f59e0b;display:inline-block;"></span>Mixed</span>
  <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:50%;background:#ef4444;display:inline-block;"></span>Closing</span>
</div>

<div id="board"></div>
</div>

<script>
const CARDS=[
  {name:'WireGuard',a:3,t:2,cat:'Network',traj:'stable',url:'wireguard'},
  {name:'AdGuard Home',a:3,t:2,cat:'Network',traj:'stable',url:'adguard-home'},
  {name:'Pi-hole',a:3,t:2,cat:'Network',traj:'stable',url:'pi-hole'},
  {name:'Nginx Proxy Manager',a:3,t:2,cat:'Network',traj:'stable',url:'nginx-proxy-manager'},
  {name:'Traefik',a:3,t:2,cat:'Network',traj:'mixed',url:'traefik'},
  {name:'Tailscale',a:2,t:1,cat:'Network',traj:'mixed',url:'tailscale'},
  {name:'Syncthing',a:3,t:2,cat:'Storage',traj:'stable',url:'syncthing'},
  {name:'Nextcloud',a:3,t:2,cat:'Storage',traj:'stable',url:'nextcloud'},
  {name:'Kopia',a:3,t:2,cat:'Storage',traj:'mixed',url:'kopia'},
  {name:'Google Drive',a:0,t:0,cat:'Storage',traj:'closing',url:'google-drive'},
  {name:'Vaultwarden',a:3,t:2,cat:'Security',traj:'stable',url:'vaultwarden'},
  {name:'KeePass',a:3,t:2,cat:'Security',traj:'stable',url:'keepass'},
  {name:'Authentik',a:3,t:2,cat:'Security',traj:'stable',url:'authentik'},
  {name:'Vault',a:3,t:1,cat:'Security',traj:'closing',url:'vault'},
  {name:'Prometheus',a:3,t:2,cat:'Observability',traj:'opening',url:'prometheus'},
  {name:'Grafana',a:3,t:2,cat:'Observability',traj:'mixed',url:'grafana'},
  {name:'Uptime Kuma',a:3,t:2,cat:'Observability',traj:'stable',url:'uptime-kuma'},
  {name:'Jellyfin',a:3,t:2,cat:'Applications',traj:'opening',url:'jellyfin'},
  {name:'Forgejo',a:3,t:2,cat:'Applications',traj:'opening',url:'forgejo'},
  {name:'Immich',a:3,t:2,cat:'Applications',traj:'stable',url:'immich'},
  {name:'Paperless-ngx',a:3,t:2,cat:'Applications',traj:'opening',url:'paperless-ngx'},
  {name:'Home Assistant',a:3,t:2,cat:'Applications',traj:'opening',url:'home-assistant'},
  {name:'Obsidian',a:2,t:0,cat:'Applications',traj:'mixed',url:'obsidian'},
  {name:'Notion',a:0,t:0,cat:'Applications',traj:'closing',url:'notion'},
  {name:'Plex',a:1,t:0,cat:'Applications',traj:'closing',url:'plex'},
  {name:'Docker',a:3,t:2,cat:'Compute',traj:'mixed',url:'docker'},
  {name:'K3s',a:3,t:2,cat:'Compute',traj:'stable',url:'k3s'},
];

const TC={opening:'#22c55e',stable:'#3b82f6',mixed:'#f59e0b',closing:'#ef4444'};
const TC_BG={opening:'#dcfce7',stable:'#dbeafe',mixed:'#fef3c7',closing:'#fee2e2'};
const CATS=['Network','Storage','Security','Observability','Applications','Compute'];
const BASE='https://revenue7-eng.github.io/the-autonomous-stack/docs/catalog/';

function render(){
  const trajF=document.getElementById('trajF').value;
  const aF=document.getElementById('aF').value;
  const tF=document.getElementById('tF').value;
  const board=document.getElementById('board');
  board.innerHTML='';
  CATS.forEach(cat=>{
    const cards=CARDS.filter(c=>c.cat===cat&&(trajF==='all'||c.traj===trajF)&&(aF==='all'||c.a===+aF)&&(tF==='all'||c.t===+tF));
    const lane=document.createElement('div');
    lane.style.cssText='display:flex;align-items:flex-start;margin-bottom:4px;';
    const lbl=document.createElement('div');
    lbl.style.cssText='font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.06em;width:110px;flex-shrink:0;padding-right:12px;text-align:right;padding-top:11px;';
    lbl.textContent=cat;
    const body=document.createElement('div');
    body.style.cssText='flex:1;display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;background:#f8f8f8;border-radius:8px;min-height:40px;align-items:center;';
    if(!cards.length){
      const e=document.createElement('span');
      e.style.cssText='font-size:12px;color:#aaa;font-style:italic;';
      e.textContent='no matches';
      body.appendChild(e);
    } else {
      cards.forEach(c=>{
        const chip=document.createElement('div');
        chip.style.cssText='display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:3px 9px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:opacity .15s;';
        chip.style.background=TC_BG[c.traj];
        chip.style.border='1px solid '+TC[c.traj]+'55';
        chip.style.color=TC[c.traj];
        const nonStd=!(c.a===3&&c.t===2);
        chip.innerHTML=c.name+(nonStd?` <span style="font-size:10px;opacity:.7;font-weight:500;">A${c.a}/T${c.t}</span>`:'');
        chip.title=c.traj+' · A'+c.a+'/T'+c.t+' · click to open';
        chip.onmouseenter=()=>{chip.style.opacity='.7';};
        chip.onmouseleave=()=>{chip.style.opacity='1';};
        chip.onclick=()=>window.open(BASE+c.url+'.html','_blank');
        body.appendChild(chip);
      });
    }
    lane.appendChild(lbl);
    lane.appendChild(body);
    board.appendChild(lane);
  });
}
['trajF','aF','tF'].forEach(id=>document.getElementById(id).addEventListener('change',render));
render();
</script>
{% endraw %}
