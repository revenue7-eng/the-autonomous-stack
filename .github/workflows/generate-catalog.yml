name: Generate Catalog Data

on:
  push:
    branches:
      - main
    paths:
      - 'docs/catalog/**.md'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate all catalog-derived content
        run: python3 .github/scripts/generate_all.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/catalog/index.md docs/audit.html docs/catalog-index.html docs/autonomy-map.html docs/dependency-graph.html docs/recommended-stack.md map.html README.md index.md docs/index.md
          git diff --cached --quiet || git commit -m "Auto-update catalog data [skip ci]"
          git push
